name: Build Apps

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "SharedClipboard" --icon "NONE" --add-data "core;core" --add-data "ui;ui" --add-data "utils;utils" --hidden-import "PySide6.QtCore" --hidden-import "PySide6.QtGui" --hidden-import "PySide6.QtWidgets" --hidden-import "PIL" main.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: SharedClipboard-Windows
          path: dist/SharedClipboard.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "共享剪贴板" \
            --osx-bundle-identifier "com.sharedclipboard.app" \
            --add-data "core:core" \
            --add-data "ui:ui" \
            --add-data "utils:utils" \
            --hidden-import "PySide6.QtCore" \
            --hidden-import "PySide6.QtGui" \
            --hidden-import "PySide6.QtWidgets" \
            --hidden-import "PIL" \
            main.py
          # 替换 Info.plist 以隐藏 Dock 图标 (LSUIElement)
          cp Info.plist "dist/共享剪贴板.app/Contents/Info.plist"

      - name: Sign and prepare app
        run: |
          # Ad-hoc 签名，避免 Gatekeeper "已损坏" 提示
          codesign --force --deep --sign - "dist/共享剪贴板.app"
          # 移除隔离属性
          xattr -cr "dist/共享剪贴板.app"

      - name: Create DMG
        run: |
          # 清理可能存在的旧文件
          rm -rf dmg_content 共享剪贴板-macOS.dmg
          mkdir -p dmg_content
          # 使用 ditto 代替 cp -r 避免资源占用问题
          ditto "dist/共享剪贴板.app" "dmg_content/共享剪贴板.app"
          ln -s /Applications dmg_content/Applications
          # 添加短暂延迟确保文件系统同步
          sleep 2
          hdiutil create -volname "共享剪贴板" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            "共享剪贴板-macOS.dmg"

      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        with:
          name: SharedClipboard-macOS-App
          path: dist/共享剪贴板.app

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: SharedClipboard-macOS-DMG
          path: 共享剪贴板-macOS.dmg

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libxkbcommon-x11-0 libglib2.0-0 libdbus-1-3 \
            libxrandr2 libxtst6 python3-xlib \
            libegl1 libgl1 libfontconfig1 \
            fuse libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "SharedClipboard" \
            --add-data "core:core" \
            --add-data "ui:ui" \
            --add-data "utils:utils" \
            --add-data "icons:icons" \
            --hidden-import "PySide6.QtCore" \
            --hidden-import "PySide6.QtGui" \
            --hidden-import "PySide6.QtWidgets" \
            --hidden-import "PIL" \
            --hidden-import "pynput.keyboard._xorg" \
            --hidden-import "pynput.mouse._xorg" \
            --hidden-import "pymysql" \
            main.py

      - name: Create AppImage
        run: |
          # 准备 AppDir 结构
          mkdir -p AppDir/usr/bin
          cp dist/SharedClipboard AppDir/usr/bin/
          cp icons/icon_256.png AppDir/icon.png

          # 创建 .desktop 文件
          cat > AppDir/SharedClipboard.desktop << 'EOF'
          [Desktop Entry]
          Name=共享剪贴板
          Exec=SharedClipboard
          Icon=icon
          Type=Application
          Categories=Utility;
          Comment=Clipboard history manager with cross-device sync
          EOF

          # 创建 AppRun 启动脚本
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/SharedClipboard" "$@"
          EOF
          chmod +x AppDir/AppRun

          # 下载 appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          # 生成 AppImage（FUSE-less 模式）
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir SharedClipboard-Linux-x86_64.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SharedClipboard-Linux-AppImage
          path: SharedClipboard-Linux-x86_64.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SharedClipboard-Windows/SharedClipboard.exe
            SharedClipboard-macOS-DMG/共享剪贴板-macOS.dmg
            SharedClipboard-Linux-AppImage/SharedClipboard-Linux-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
